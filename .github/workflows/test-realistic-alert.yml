name: Test realistic alert

# Manual end-to-end smoke test: fires one production-shape alert SMS
# (verb + contract + prices + bushels + tranche + "Reply Y/N") and
# records it as pending so remind-pending.yml nudges on its usual
# schedule — first reminder at +5 min, then every minute up to cap.
#
# Uses the plain (URL-safe) send script so the test works on Textbelt
# accounts that have not been whitelisted for URL features.
#
# Use this when you want to see what a real alert AND its first
# reminder look like on your phone. Costs 2 TextBelt credits per
# recipient if you ignore the initial (initial + 1st reminder), up to
# 6 if you let the cap fully play out (initial + 5 reminders).
#
# Inputs (all optional):
#   phone   E.164 phone (or comma-separated list) to receive the test.
#           When provided, OVERRIDES the ALERT_PHONE secret so the test
#           lands on just the number(s) you specified. Leave blank to
#           hit every number in ALERT_PHONE — same as a production fire.
on:
  workflow_dispatch:
    inputs:
      phone:
        description: "Override recipient (E.164, comma-sep). Blank = use ALERT_PHONE secret."
        required: false
        default: ""

concurrency:
  group: test-realistic-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send realistic alert + record pending
        env:
          TEXTBELT_KEY: ${{ secrets.TEXTBELT_KEY }}
          # If `phone` input is set, use it; otherwise fall back to the secret.
          # GitHub renders the input verbatim, so quoting protects against
          # accidental whitespace/newlines.
          ALERT_PHONE:  ${{ inputs.phone != '' && inputs.phone || secrets.ALERT_PHONE }}
          # Tweak any of these to simulate a different tranche/fire.
          SIM_COMMODITY: "corn"
          SIM_CONTRACT:  "Dec '26"
          SIM_LIVE:      "4.75"
          SIM_TARGET:    "4.74"
          SIM_QUANTITY:  "8250"
          SIM_TRANCHE:   "Tranche 1 (25%)"
        run: |
          echo "Sending test alert to: ${ALERT_PHONE}"
          python scripts/send_realistic_test_plain.py

      - name: Commit confirmations state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "test-realistic: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
