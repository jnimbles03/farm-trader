name: Weekly Grain Brief Prep

# Runs once tomorrow, then every Monday at 9am Eastern.
# Pulls latest prices, inventory, oil, dollar proxy.
# Generates the weekly grain brief and sends SMS summary.

on:
  schedule:
    - cron: '0 13 30 6 *'   # one-time tomorrow run at 9am Eastern (2026-06-30)
    - cron: '0 13 * * 1'     # every Monday at 9am Eastern
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh live bushel/balance snapshot first
        env:
          BUSHEL_USER: ${{ secrets.BUSHEL_USER }}
          BUSHEL_PASS: ${{ secrets.BUSHEL_PASS }}
          AKRON_USER:  ${{ secrets.BUSHEL_USER }}
          AKRON_PASS:  ${{ secrets.BUSHEL_PASS }}
        run: |
          if [ -z "$BUSHEL_USER" ] || [ -z "$BUSHEL_PASS" ]; then
            echo "::warning::BUSHEL_USER / BUSHEL_PASS not set — skipping refresh, using existing docs snapshot."
            exit 0
          fi
          if [ -f "scripts/scrape_bushel.py" ]; then
            python3 scripts/scrape_bushel.py
          else
            echo "::warning::scripts/scrape_bushel.py not present — skipping refresh."
          fi

      - name: Fetch current weekly target from admin
        run: |
          curl -s -f "https://freis-farm-sms-reply.freis.workers.dev/config/weekly" > /tmp/weekly-config.json || echo '{"target_pct": null}' > /tmp/weekly-config.json
          cp /tmp/weekly-config.json docs/weekly-config.json || true
          echo "Weekly config: $(cat /tmp/weekly-config.json)"

      - name: Prepare weekly review + SMS
        env:
          TEXTBELT_KEY: ${{ secrets.TEXTBELT_KEY }}
        run: python scripts/prepare_weekly_review.py

      - name: Commit updates
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/weekly_macro_review.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "weekly-review: auto review for $(date -u +'%Y-%m-%d')"
          git remote set-url origin https://x:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git
          git push
