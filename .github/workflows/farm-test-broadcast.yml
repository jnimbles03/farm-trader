name: Farm test broadcast

# Dispatch-only: fires the canonical [FARM TEST] group-confirmation SMS
# to a fixed list of 6 family numbers (3 required, 3 optional) and
# records the send as pending in state/confirmations.json so YES/Y
# replies are collected via collect-reply.yml.
#
# Reuses the same TEXTBELT_KEY + REPLY_WEBHOOK_URL secrets as the
# production alert flow. Recipient list is hardcoded in
# scripts/send_farm_test_broadcast.py.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log what would send, no SMS, no state write"
        type: boolean
        required: false
        default: true
      solo:
        description: "Solo — send only to Patrick (+1 630 247 9950)"
        type: boolean
        required: false
        default: false

concurrency:
  group: farm-test-broadcast
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send farm test broadcast
        env:
          TEXTBELT_KEY:      ${{ secrets.TEXTBELT_KEY }}
          REPLY_WEBHOOK_URL: ${{ secrets.REPLY_WEBHOOK_URL }}
          DRY_RUN:           ${{ inputs.dry_run }}
          SOLO:              ${{ inputs.solo }}
        run: python scripts/send_farm_test_broadcast.py

      - name: Commit pending confirmation
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "farm-test-broadcast: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
