name: Evaluate grain signals

# Every 15 min, 13:00-19:45 UTC, Mon-Fri. That window covers the
# CBOT grain day session (8:30-13:20 CT) under both CST (UTC-6)
# and CDT (UTC-5), with a little slack on either side.
#
# GitHub's scheduler can drift 0-15 min under load; that's fine
# for a family dashboard that already lives on delayed quotes.
on:
  schedule:
    - cron: "*/15 13-19 * * 1-5"
  workflow_dispatch:    # also runnable on demand from the Actions tab

concurrency:
  group: evaluate
  cancel-in-progress: false

permissions:
  contents: write        # needed to commit docs/ + state/ back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Evaluate
        env:
          TEXTBELT_KEY:   ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:    ${{ secrets.ALERT_PHONE }}
          ALERT_COOLDOWN: "86400"
        run: python evaluate.py

      - name: Commit updated prices + state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs state
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "evaluate: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
