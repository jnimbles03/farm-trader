name: Evaluate grain signals

# Two-tier schedule, all UTC (GitHub Actions cron has no TZ support):
#
# 1) Active hours — every 15 min during 6am-9pm CT (the user's chosen
#    quiet-hours boundary). CT is UTC-6 in winter (CST) and UTC-5 in
#    summer (CDT), so we cover the union: 11:00-02:59 UTC = 5am/6am-
#    8pm/9pm CT depending on DST. Crosses UTC midnight, hence two
#    range tokens.
# 2) Quiet hours — once per hour during 10pm-5am CT. Same DST logic
#    in reverse: 03:00-10:00 UTC. This keeps the dashboard fresh and
#    catches overnight news drops at top-of-hour granularity without
#    spamming the phone (the SMS cooldown is what actually decides
#    whether anything sends).
#
# 7 days a week — covers Sunday-night USDA WASDE drops, weekend news.
#
# GitHub's scheduler drifts 0-15 min under load; fine for a family
# dashboard that already lives on delayed quotes.
on:
  schedule:
    - cron: "*/15 11-23,0-2 * * *"   # active: 6am-9pm CT (both DST seasons)
    - cron: "0 3-10 * * *"           # quiet:  10pm-5am CT, hourly
  workflow_dispatch:    # also runnable on demand from the Actions tab

concurrency:
  group: evaluate
  cancel-in-progress: false

permissions:
  contents: write        # needed to commit docs/ + state/ back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Evaluate
        env:
          TEXTBELT_KEY:      ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:       ${{ secrets.ALERT_PHONE }}
          TRADE_PHONES:      ${{ secrets.TRADE_PHONES }}
          NEWS_PHONES:       ${{ secrets.NEWS_PHONES }}
          REPLY_WEBHOOK_URL: ${{ secrets.REPLY_WEBHOOK_URL }}
          ALERT_COOLDOWN:    "86400"
        run: python evaluate.py

      - name: Commit updated prices + state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs state
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "evaluate: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
