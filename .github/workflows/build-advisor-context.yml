name: Refresh advisor bundle (live Ritchie overlay)

# Daily 6am CT (11:00 UTC), Mon–Fri.
#
# What this workflow does TODAY:
#   1. refresh_ritchie.py  — log into Bushel via the portal-mediated flow,
#                             pull commodity-balances + bids, write
#                             docs/advisor/ritchie_live.json.
#   2. patch_advisor_bundle.py — overlay that sidecar onto the existing
#                                 docs/advisor/advisor_context.json by
#                                 appending a same-day storage_state row.
#   3. Commit + push if anything changed.
#
# What this workflow does NOT do:
#   - Rebuild the bundle from scratch. The xlsx-driven advisor/context_builder.py
#     still runs on Jimmy's Mac when books change; that produces the canonical
#     advisor_context.json which is committed manually. This workflow only
#     refreshes the live Ritchie slice on top of whatever the last commit shipped.
#
# Manual run available via workflow_dispatch — useful when you want to pull
# fresh Ritchie data on demand without waiting for 6am.

on:
  schedule:
    # Pre-market baseline at 6am CT (11:00 UTC), Mon–Fri.
    - cron: "0 11 * * 1-5"
    # Every 30 minutes during the CME grain trading day, Mon–Fri:
    # 8:00am CT (13:00 UTC) through 1:30pm CT (18:30 UTC). The pit closes
    # at 1:20pm CT — we run one extra refresh just after to catch the
    # closing settle and any same-day Ritchie back-office processing.
    - cron: "0,30 13-18 * * 1-5"
  workflow_dispatch:

concurrency:
  group: build-advisor-context
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 lxml python-dotenv

      - name: Refresh live Ritchie data (Bushel)
        id: refresh
        env:
          BUSHEL_USER: ${{ secrets.BUSHEL_USER }}
          BUSHEL_PASS: ${{ secrets.BUSHEL_PASS }}
        run: |
          if [ -z "${BUSHEL_USER:-}" ] || [ -z "${BUSHEL_PASS:-}" ]; then
            echo "::warning::BUSHEL_USER / BUSHEL_PASS not set — skipping refresh."
            echo "refreshed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p docs/advisor
          if python3 refresh_ritchie.py; then
            echo "refreshed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::refresh_ritchie.py exited non-zero — bundle stays unchanged."
            echo "refreshed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch bundle with live overlay
        if: steps.refresh.outputs.refreshed == 'true'
        run: |
          python3 patch_advisor_bundle.py

      - name: Commit + push if changed
        if: steps.refresh.outputs.refreshed == 'true'
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/advisor/advisor_context.json docs/advisor/ritchie_live.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "ritchie-live: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
