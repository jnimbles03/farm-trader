name: Test confirmation flow

# Dispatch-only: fires a fake "signal" SMS to every ALERT_PHONE recipient
# with a real confirmation code, then commits the pending record to
# state/confirmations.json so collect-reply.yml can match replies against
# it. Use this to end-to-end test the Y/N reply loop without waiting for
# a real signal to hit.

on:
  workflow_dispatch:

concurrency:
  group: test-confirmation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fire test confirmation
        env:
          TEXTBELT_KEY:      ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:       ${{ secrets.ALERT_PHONE }}
          REPLY_WEBHOOK_URL: ${{ secrets.REPLY_WEBHOOK_URL }}
        run: python evaluate.py --test-confirmation

      - name: Commit pending confirmation
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit (nothing to collect later)"
            exit 0
          fi
          git commit -m "test-confirmation: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
