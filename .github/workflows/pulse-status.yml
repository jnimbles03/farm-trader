name: Pulse confirmation status

# Every 5 minutes during market hours, text the operator a status
# pulse for any confirmation still in `pending`. Skips alerts whose
# vote tally hasn't changed since the last pulse, hard-caps at
# PULSE_MAX_COUNT pulses per alert.
#
# Cadence is enforced inside pulse_status.py (PULSE_INTERVAL_S) so the
# workflow can run more often than 5 min and not double-fire — the
# script just no-ops. We schedule at 5 min anyway to match the
# operator's expectation.
#
# Important: GitHub's scheduler can drift 0–15 min under load. The
# script is idempotent — when a backed-up tick finally runs it will
# catch up whatever was due.

on:
  schedule:
    - cron: "*/5 13-19 * * 1-5"
  workflow_dispatch:

concurrency:
  group: pulse-status
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pulse pending confirmations
        env:
          TEXTBELT_KEY:     ${{ secrets.TEXTBELT_KEY }}
          OPERATOR_PHONE:   ${{ secrets.OPERATOR_PHONE }}
          PULSE_INTERVAL_S: "300"
          PULSE_MAX_COUNT:  "12"
          PULSE_QUIET_NEW_S: "60"
        run: python scripts/pulse_status.py

      - name: Commit updated confirmation state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "pulse: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
