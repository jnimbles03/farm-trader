name: Remind pending confirmations

# Re-ping recipients who haven't replied Y/N to a pending alert.
#
# Cadence knobs live in remind_pending.py itself (FIRST_REMINDER_DELAY,
# REMINDER_INTERVAL, MAX_REMINDERS). Defaults: first nudge 5 min after
# the original alert, then every 1 min, capped at 30 nudges per
# recipient.
#
# Cron runs every minute during the same window evaluate.yml covers.
# Important: GitHub's scheduler can drift 0-15 min under load, so the
# "every 1 minute" cadence is a ceiling — in practice reminders may
# arrive slower when Actions is busy. The script is idempotent, so
# when a backed-up tick finally runs it will catch up whatever was due.
on:
  schedule:
    - cron: "* 13-19 * * 1-5"
  workflow_dispatch:

concurrency:
  group: remind-pending
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sweep pending confirmations
        env:
          TEXTBELT_KEY:         ${{ secrets.TEXTBELT_KEY }}
          REPLY_WEBHOOK_URL:    ${{ secrets.REPLY_WEBHOOK_URL }}
          FIRST_REMINDER_DELAY: "300"
          REMINDER_INTERVAL:    "60"
          MAX_REMINDERS:        "5"
        run: python scripts/remind_pending.py

      - name: Commit updated confirmation state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "remind: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
