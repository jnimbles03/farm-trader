name: Test SMS delivery

# Dispatch-only: lets you fire one TextBelt message to ALERT_PHONE from
# the Actions tab. Useful for verifying the secret is valid and the
# carrier accepts TextBelt's originating number. Does NOT touch
# prices.json, signals.json, or state.
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "SMS provider to test"
        type: choice
        required: true
        default: "auto"
        options:
          - auto        # Twilio if configured, else TextBelt
          - textbelt    # force TextBelt even when Twilio secrets exist

permissions:
  contents: read

jobs:
  sms:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send test SMS
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TEXTBELT_KEY:       ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:        ${{ secrets.ALERT_PHONE }}
        run: |
          if [ "${{ inputs.provider }}" = "textbelt" ]; then
            python evaluate.py --test-sms --force-textbelt
          else
            python evaluate.py --test-sms
          fi
