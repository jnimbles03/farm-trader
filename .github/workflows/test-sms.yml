name: Test SMS delivery

# Dispatch-only: fires one TextBelt message to every number in ALERT_PHONE
# (comma-separated) from the Actions tab. Useful for verifying the key and
# that each recipient's carrier accepts TextBelt's originating number.
# Does NOT touch prices.json, signals.json, or state.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sms:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send test SMS
        env:
          TEXTBELT_KEY: ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:  ${{ secrets.ALERT_PHONE }}
          TRADE_PHONES: ${{ secrets.TRADE_PHONES }}
          NEWS_PHONES:  ${{ secrets.NEWS_PHONES }}
        run: python evaluate.py --test-sms
