name: Collect SMS reply

# Fired by the Cloudflare Worker (cloudflare-worker/) whenever TextBelt
# delivers an inbound reply. One run per reply; runs serialize per phone
# number so two fast replies from the same person can't race on the file.
on:
  repository_dispatch:
    types: [sms_reply]

concurrency:
  group: collect-reply-${{ github.event.client_payload.phone }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Record reply
        env:
          REPLY_PHONE:       ${{ github.event.client_payload.phone }}
          REPLY_TEXT:        ${{ github.event.client_payload.text }}
          REPLY_RECEIVED_AT: ${{ github.event.client_payload.received_at }}
          TEXTBELT_KEY:      ${{ secrets.TEXTBELT_KEY }}
          ALERT_PHONE:       ${{ secrets.ALERT_PHONE }}
        run: python scripts/collect_reply.py

      - name: Commit updated confirmation state
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "reply: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
