# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Redeploy after the data-refresh crons commit fresh JSON to docs/.
  # Those workflows push with the automatic GITHUB_TOKEN, and GitHub's
  # anti-recursion rule means such pushes do NOT trigger the `push`
  # event above — so without this, evaluate/bushel/market-wire commits
  # land in the repo but never redeploy Pages, leaving the live site
  # stale until the next human push. workflow_run fires regardless of
  # who pushed, so every data refresh now redeploys the site.
  workflow_run:
    workflows:
      - "Evaluate grain signals"
      - "Refresh bushel.json (Akron live bids)"
      - "Refresh market wire"
    types: [completed]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    # For workflow_run triggers, only deploy when the upstream data
    # refresh actually succeeded — no point publishing a half-written
    # docs/ from a failed run. push and workflow_dispatch always deploy.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only the docs/ folder so files like docs/admin.html are
          # served at /admin.html (matches the legacy "Deploy from branch /
          # docs" Pages config). Uploading '.' caused docs/* files to land
          # under /docs/* and 404 at the canonical URL.
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
