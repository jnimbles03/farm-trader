name: Refresh market wire

# Runs at 7 am and 2 pm CDT (= 12:00 and 19:00 UTC, weekdays).
# Pulls recent corn/soy news from Yahoo Finance + today's price moves
# and writes docs/news.json, which the dashboard blotter reads on load.
on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7 am CDT
    - cron: '0 19 * * 1-5'   # 2 pm CDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh market wire
        run: python scripts/refresh_market_wire.py

      - name: Commit news
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/news.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "wire: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git remote set-url origin https://x:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git
          git push