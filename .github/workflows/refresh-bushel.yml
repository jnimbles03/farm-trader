name: Refresh bushel.json (Akron live bids)

# Re-scrapes the Akron / Ritchie portal and updates docs/bushel.json on
# a 15-minute cadence during market hours. Keeps the dashboard's bid
# feed AND the worker's /admin/inventory + reminder-cycle bid pulls
# fresh without anyone having to run scrape_bushel.py by hand.
#
# Market hours coverage:
#   13:00–21:00 UTC = 08:00–16:00 CDT (CBOT day session is 08:30–13:20 CT
#   with cash bids continuing through afternoon). Mon–Fri only.
#
# Manual trigger via workflow_dispatch — useful right before a live
# trade send to guarantee the freshest possible bid.

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: refresh-bushel
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          # scripts/scrape_bushel.py imports requests + bs4 (lxml parser)
          # + python-dotenv. python-dotenv only loads a local .env in dev;
          # we install it so the import doesn't blow up the CI run.
          # refresh_elevator_bids.py only needs requests (already covered).
          pip install requests beautifulsoup4 lxml python-dotenv

      - name: Scrape live bids
        env:
          # Pass creds under BOTH names so either script variant picks
          # them up. The GH secret is BUSHEL_USER/BUSHEL_PASS (per
          # refresh_ritchie.py); scripts/scrape_bushel.py reads
          # AKRON_USER/AKRON_PASS — feed it the same value.
          BUSHEL_USER: ${{ secrets.BUSHEL_USER }}
          BUSHEL_PASS: ${{ secrets.BUSHEL_PASS }}
          AKRON_USER:  ${{ secrets.BUSHEL_USER }}
          AKRON_PASS:  ${{ secrets.BUSHEL_PASS }}
        run: |
          if [ -z "$BUSHEL_USER" ] || [ -z "$BUSHEL_PASS" ]; then
            echo "::warning::BUSHEL_USER / BUSHEL_PASS not set — cannot scrape, exiting clean."
            exit 0
          fi
          # CI-friendly copy lives at scripts/scrape_bushel.py (output
          # paths use HERE.parent / "docs" so it writes to docs/bushel.json).
          if [ -f "scripts/scrape_bushel.py" ]; then
            python3 scripts/scrape_bushel.py
          else
            echo "::warning::scripts/scrape_bushel.py not present — cannot refresh."
            exit 0
          fi

      - name: Refresh competing-elevator bids (FS Grain regional grid)
        run: |
          # Pulls cash bids from fsgrain.com/markets/cashgrid.php — covers
          # ADM, CHS, CGB, FS Grain, etc. — combines with futures from
          # AgriCharts and reads docs/bushel.json for the Ritchie baseline.
          # Writes data/elevator_bids.json + docs/elevator_bids.json
          # consumed by the Farm Ops "Where else this could go" panel.
          # Script auto-discovers paths so it works at this repo root.
          if [ -f "refresh_elevator_bids.py" ]; then
            python3 refresh_elevator_bids.py || \
              echo "::warning::refresh_elevator_bids.py failed — keeping previous JSON."
          else
            echo "::warning::refresh_elevator_bids.py not present — skipping."
          fi

      - name: Commit + push if changed
        run: |
          git config user.name  "freis-farm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/bushel.json docs/bushel_raw.json docs/elevator_bids.json data/elevator_bids.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No bid changes since last refresh."
            exit 0
          fi
          # Brief commit message including the new corn/soy headline bids
          summary=$(python3 -c "
          import json
          d = json.load(open('docs/bushel.json'))
          c = d.get('bids', {}).get('corn',     {})
          s = d.get('bids', {}).get('soybeans', {})
          print(f\"corn \${c.get('price','?')} ({c.get('period','?')}), soy \${s.get('price','?')} ({s.get('period','?')})\")
          ")
          git commit -m "bushel-refresh: $summary @ $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
