<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Freis Farm Board of Trade">
  <!-- Flat-top regular octagon, farm-green fill. Same green as the
       corn commodity color elsewhere in the dashboard (#1e4a2a) so
       the mark lives in the existing palette rather than introducing
       a new color. -->
  <polygon points="70,20 130,20 180,70 180,130 130,180 70,180 20,130 20,70"
           fill="#1e4a2a"/>

  <!-- Globe outline and the two center lines: the equator (horizontal)
       and the prime meridian (vertical). White on blue for maximum
       contrast at small sizes. -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="butt">
    <circle cx="100" cy="100" r="62"/>
    <line x1="38" y1="100" x2="162" y2="100"/>
    <line x1="100" y1="38" x2="100" y2="162"/>
  </g>

  <!-- Latitude and longitude curves — ellipses whose minor axes flip
       between rx and ry to fake the 3D curvature of a globe. Two rings
       in each direction gives enough depth without cluttering the
       mark at 44px. -->
  <g fill="none" stroke="#ffffff" stroke-width="2">
    <ellipse cx="100" cy="100" rx="62" ry="22"/>
    <ellipse cx="100" cy="100" rx="62" ry="42"/>
    <ellipse cx="100" cy="100" rx="22" ry="62"/>
    <ellipse cx="100" cy="100" rx="42" ry="62"/>
  </g>
</svg>
