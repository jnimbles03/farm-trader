<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Freis Farm Board of Trade">
  <!-- Outer octagon: red outline, thick stroke. CBOT-inspired —
       trading-pit iconography translated to the farm context. -->
  <polygon points="100,20 157,43 180,100 157,157 100,180 43,157 20,100 43,43"
           fill="none" stroke="#d62828" stroke-width="14" stroke-linejoin="miter"/>

  <!-- Inner octagon forming the bullseye target ring. -->
  <polygon points="100,60 128,72 140,100 128,128 100,140 72,128 60,100 72,72"
           fill="none" stroke="#d62828" stroke-width="7" stroke-linejoin="miter"/>

  <!-- Center dot — the target's bullseye. -->
  <circle cx="100" cy="100" r="10" fill="#d62828"/>

  <!-- Corner accent square on the top-right of the outer octagon. -->
  <rect x="150" y="22" width="22" height="22" fill="#d62828" rx="1"/>
</svg>
