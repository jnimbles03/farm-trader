<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Freis Farm">
  <!-- Outer + inner rings of the heritage seal. Weight scales up so the
       mark stays legible when used at small sizes (48–60px) in headers. -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#1e4a2a" stroke-width="4"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="#1e4a2a" stroke-width="1.25"/>

  <!-- Rust accent dots at 12 / 3 / 6 / 9 — the only non-green color in
       the mark. Ties to the soy commodity hue used elsewhere. -->
  <circle cx="36"  cy="150" r="4.5" fill="#703810"/>
  <circle cx="264" cy="150" r="4.5" fill="#703810"/>
  <circle cx="150" cy="36"  r="4.5" fill="#703810"/>
  <circle cx="150" cy="264" r="4.5" fill="#703810"/>

  <!-- Horizon line — splits the center scene into sky and cropland. -->
  <line x1="75" y1="200" x2="225" y2="200" stroke="#1e4a2a" stroke-width="2.5"/>

  <!-- Barn with small door -->
  <g fill="#1e4a2a">
    <polygon points="92,178 112,162 132,178 132,200 92,200"/>
  </g>
  <rect x="112" y="170" width="6" height="9" fill="#f8f6f0" stroke="#1e4a2a" stroke-width="1.5"/>
  <line x1="112" y1="178" x2="132" y2="178" stroke="#1e4a2a" stroke-width="1.25"/>

  <!-- Silo with dome top -->
  <g stroke="#1e4a2a" fill="#f8f6f0" stroke-width="2">
    <rect x="180" y="166" width="16" height="34"/>
    <path d="M 180 166 Q 188 158 196 166"/>
  </g>

  <!-- Sun disc above the horizon -->
  <circle cx="150" cy="155" r="12" fill="none" stroke="#1e4a2a" stroke-width="2.5"/>

  <!-- Field rows below the horizon, in the soy rust color -->
  <g stroke="#703810" stroke-width="1">
    <line x1="80"  y1="212" x2="220" y2="212"/>
    <line x1="85"  y1="222" x2="215" y2="222"/>
    <line x1="90"  y1="232" x2="210" y2="232"/>
  </g>
</svg>
